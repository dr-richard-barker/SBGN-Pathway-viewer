name: Deploy website (Jekyll) + app to GitHub Pages

# Builds the Jekyll themed website (site/) and the standalone Vite app, then
# publishes them together: the website at the site root and the interactive app
# under /app. Enable once in repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Build the interactive app (Vite) -> dist/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build app
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

      # 2) Build the Jekyll website (site/) -> _site/
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: site
      - name: Build Jekyll site
        working-directory: site
        env:
          JEKYLL_ENV: production
          # github-pages metadata plugin needs to know the repo when building
          # outside the legacy Pages environment.
          PAGES_REPO_NWO: ${{ github.repository }}
          JEKYLL_GITHUB_TOKEN: ${{ github.token }}
        run: bundle exec jekyll build --destination "$GITHUB_WORKSPACE/_site"

      # 3) Nest the app under /app within the published site
      - name: Add app to site
        run: |
          mkdir -p _site/app
          cp -r dist/* _site/app/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
